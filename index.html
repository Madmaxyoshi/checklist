<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="format-detection" content="telephone=no,address=no,email=no">
<title>車両受け入れチェック</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#F5F5F0;color:#1a1a1a;min-height:100vh}
.header{background:#1F4E79;color:#fff;padding:16px 20px;position:sticky;top:0;z-index:100}
.header h1{font-size:17px;font-weight:600}
.header-sub{font-size:12px;opacity:.7;margin-top:2px}
.tab-bar{display:flex;background:#fff;border-bottom:1px solid #E0E0E0;position:sticky;top:57px;z-index:99}
.tab{flex:1;padding:12px;font-size:14px;text-align:center;cursor:pointer;border-bottom:2px solid transparent;color:#888}
.tab.active{color:#1F4E79;border-bottom-color:#1F4E79;font-weight:600}
.content{padding:16px;max-width:600px;margin:0 auto}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-title{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.scan-btn{width:100%;padding:18px;border-radius:10px;border:none;background:#1F4E79;color:#fff;font-size:16px;font-weight:600;cursor:pointer}
.scan-btn:active{background:#173d61}
.cam-wrap{display:none;position:relative;width:100%;border-radius:10px;overflow:hidden;background:#000;margin-top:12px}
.cam-wrap video{width:100%;display:block}
.scan-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.scan-frame{width:70%;aspect-ratio:1;border:3px solid #4CAF50;border-radius:10px;box-shadow:0 0 0 9999px rgba(0,0,0,.45)}
.scan-hint{position:absolute;bottom:14px;left:0;right:0;text-align:center;color:#fff;font-size:13px;font-weight:500}
.cancel-btn{width:100%;padding:12px;border-radius:10px;border:1px solid #ddd;background:#fff;color:#666;font-size:14px;cursor:pointer;margin-top:8px;display:none}
.result-box{display:none;margin-top:12px;background:#EBF5EB;border:1px solid #A8D5A2;border-radius:10px;padding:14px;text-align:center}
.result-lbl{font-size:11px;color:#2E7D32;font-weight:600;letter-spacing:.04em;margin-bottom:6px}
.result-val{font-size:16px;font-weight:700;color:#1a1a1a;word-break:break-all}
.rescan-link{font-size:13px;color:#1F4E79;margin-top:8px;cursor:pointer;text-decoration:underline;display:inline-block}
.form-input{width:100%;padding:12px 14px;border:1px solid #ddd;border-radius:10px;font-size:16px;background:#fff;color:#1a1a1a;-webkit-appearance:none;margin-bottom:10px}
.form-input:last-child{margin-bottom:0}
.form-input:focus{outline:none;border-color:#1F4E79}
textarea.form-input{height:80px;resize:none}
.form-label{font-size:13px;color:#666;margin-bottom:5px;display:block;font-weight:500}
.check-item{padding:14px 0;border-bottom:1px solid #F0F0F0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.check-item:last-child{border-bottom:none}
.check-info{flex:1}
.check-name{font-size:15px;font-weight:500}
.check-sub{font-size:12px;color:#999;margin-top:2px}
.btn-group{display:flex;gap:6px;flex-shrink:0}
.s-btn{padding:7px 14px;border-radius:99px;border:1px solid #ddd;font-size:13px;font-weight:500;cursor:pointer;background:#fff;color:#666;white-space:nowrap}
.s-btn.ok{background:#EBF5EB;color:#2E7D32;border-color:#A8D5A2}
.s-btn.ng{background:#FDECEC;color:#C62828;border-color:#F5A5A5}
.s-btn.na{background:#F5F5F5;color:#555;border-color:#ccc}
.submit-btn{width:100%;padding:16px;border-radius:10px;border:none;background:#1F4E79;color:#fff;font-size:16px;font-weight:600;cursor:pointer;margin-top:4px}
.mail-btn{width:100%;padding:16px;border-radius:10px;border:none;background:#D84315;color:#fff;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:10px}
.mail-btn:active{background:#BF360C}
.next-btn{width:100%;padding:14px;border-radius:10px;border:1px solid #ddd;background:#fff;color:#555;font-size:15px;cursor:pointer}
.page{display:none}.page.active{display:block}
.result-card{background:#fff;border-radius:12px;padding:20px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.result-summary{font-size:14px;color:#444;line-height:1.9}
.ng-badge{display:inline-block;background:#FDECEC;color:#C62828;border-radius:99px;padding:2px 10px;font-size:12px;font-weight:600}
.ok-badge{display:inline-block;background:#EBF5EB;color:#2E7D32;border-radius:99px;padding:2px 10px;font-size:12px;font-weight:600}
.sent-msg{display:none;text-align:center;font-size:13px;color:#2E7D32;font-weight:600;margin-bottom:12px}
</style>
</head>
<body>
<div class="header">
  <h1>車両受け入れチェック</h1>
  <div class="header-sub">物流管理課</div>
</div>
<div class="tab-bar">
  <div class="tab active" onclick="sw('input')">入力</div>
  <div class="tab" onclick="sw('guide')">メール設定</div>
</div>
<div class="content">
<div id="p-input" class="page active">
  <div id="form-wrap">
    <div class="card">
      <div class="card-title">QRコード読み取り</div>
      <button class="scan-btn" id="scan-btn" onclick="startScan()">カメラでQRコードを読む</button>
      <div class="cam-wrap" id="cam-wrap">
        <video id="video" playsinline autoplay muted></video>
        <div class="scan-overlay">
          <div class="scan-frame"></div>
          <div class="scan-hint">QRコードを緑の枠内に合わせる</div>
        </div>
      </div>
      <button class="cancel-btn" id="cancel-btn" onclick="stopScan()">キャンセル</button>
      <div class="result-box" id="result-box">
        <div class="result-lbl">読み取り完了</div>
        <div class="result-val" id="result-val"></div>
        <span class="rescan-link" onclick="reScan()">読み直す</span>
      </div>
    </div>
    <div class="card">
      <div class="card-title">車両情報</div>
      <label class="form-label">製番</label>
      <input type="text" class="form-input" id="seiban" placeholder="例: 25-9A5804" autocomplete="off" autocorrect="off" autocapitalize="off">
      <label class="form-label">型式</label>
      <input type="text" class="form-input" id="katashiki" placeholder="例: CYJ77DAWXD" autocomplete="off" autocorrect="off" autocapitalize="off">
      <label class="form-label">車番</label>
      <input type="text" class="form-input" id="shaban" placeholder="例: 7015259" autocomplete="off" autocorrect="off" autocapitalize="off">
    </div>
    <div class="card">
      <div class="card-title">担当者</div>
      <input type="text" class="form-input" id="op" placeholder="氏名を入力" autocomplete="off" autocorrect="off">
    </div>
    <div class="card">
      <div class="card-title">外観・キズチェック</div>
      <div id="ext"></div>
    </div>
    <div class="card">
      <div class="card-title">受け入れ確認</div>
      <div id="rec"></div>
    </div>
    <div class="card">
      <div class="card-title">備考</div>
      <textarea class="form-input" id="rem" placeholder="キズ詳細・その他"></textarea>
    </div>
    <button class="submit-btn" onclick="doSubmit()">確認して記録へ</button>
    <div style="height:32px"></div>
  </div>
  <div id="result-wrap" class="page">
    <div class="result-card">
      <div class="card-title" style="margin-bottom:14px">記録内容</div>
      <div class="result-summary" id="summary"></div>
    </div>
    <button class="mail-btn" onclick="sendMail()">Gmailで送信</button>
    <div class="sent-msg" id="sent-msg">メールアプリが開きます。送信ボタンを押してください。</div>
    <button class="next-btn" onclick="doReset()">次の車両を入力</button>
    <div style="height:32px"></div>
  </div>
</div>
<div id="p-guide" class="page">
  <div class="card" style="margin-top:4px">
    <div class="card-title" style="margin-bottom:12px">送信先メールアドレス</div>
    <label class="form-label">自分のGmailアドレスを入力</label>
    <input type="text" class="form-input" id="mail-to" placeholder="例: yourname@gmail.com" autocomplete="off" autocorrect="off" autocapitalize="off">
    <button style="width:100%;padding:12px;border-radius:10px;border:none;background:#1F4E79;color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px" onclick="saveMail()">保存</button>
    <div id="mail-saved" style="display:none;text-align:center;font-size:13px;color:#2E7D32;font-weight:600;margin-top:8px">保存しました</div>
  </div>
  <div class="card">
    <div class="card-title" style="margin-bottom:12px">使い方</div>
    <div style="font-size:14px;color:#444;line-height:2">
      1. QRを読む（または手入力）<br>
      2. チェック入力<br>
      3. 「Gmailで送信」タップ<br>
      4. メールアプリが開く → 送信<br>
      5. PCのGmailで受信 → Excelに貼り付け
    </div>
  </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
const extItems=[
  {id:'e1',label:'フロント',sub:'バンパー・ボンネット'},
  {id:'e2',label:'サイド左',sub:'ドア・フェンダー'},
  {id:'e3',label:'サイド右',sub:'ドア・フェンダー'},
  {id:'e4',label:'リア',sub:'バンパー・トランク'},
  {id:'e5',label:'ルーフ',sub:'天井部'},
];
const recItems=[
  {id:'r1',label:'書類確認',sub:'車検証・保険証等'},
  {id:'r2',label:'鍵受け取り',sub:'スペアキー含む'},
  {id:'r3',label:'タイヤ状態',sub:'空気圧・摩耗'},
  {id:'r4',label:'燃料残量',sub:'計器確認'},
];
let st={},mailBody='',stream=null,rafId=null;

function buildChecks(items,cid){
  const el=document.getElementById(cid);el.innerHTML='';
  items.forEach(it=>{
    st[it.id]=null;
    el.innerHTML+=`<div class="check-item">
      <div class="check-info"><div class="check-name">${it.label}</div><div class="check-sub">${it.sub}</div></div>
      <div class="btn-group">
        <button class="s-btn" id="b-ok-${it.id}" onclick="setSt('${it.id}','ok')">OK</button>
        <button class="s-btn" id="b-ng-${it.id}" onclick="setSt('${it.id}','ng')">NG</button>
        <button class="s-btn" id="b-na-${it.id}" onclick="setSt('${it.id}','na')">—</button>
      </div></div>`;
  });
}

function setSt(id,val){
  st[id]=val;
  ['ok','ng','na'].forEach(s=>{
    const b=document.getElementById('b-'+s+'-'+id);
    if(b)b.className='s-btn'+(s===val?' '+s:'');
  });
}

async function startScan(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}}});
    const video=document.getElementById('video');
    video.srcObject=stream;
    await video.play();
    document.getElementById('cam-wrap').style.display='block';
    document.getElementById('cancel-btn').style.display='block';
    document.getElementById('scan-btn').style.display='none';
    document.getElementById('result-box').style.display='none';
    scanLoop();
  }catch(e){alert('カメラを許可してください');}
}

let fc=0;
function scanLoop(){
  const video=document.getElementById('video');
  fc++;
  if(fc%2===0&&video.readyState>=2&&video.videoWidth>0){
    const c=document.createElement('canvas');
    c.width=video.videoWidth;c.height=video.videoHeight;
    const ctx=c.getContext('2d');
    ctx.drawImage(video,0,0);
    const img=ctx.getImageData(0,0,c.width,c.height);
    const code=jsQR(img.data,img.width,img.height,{inversionAttempts:'attemptBoth'});
    if(code&&code.data){
      stopScan();
      parseQR(code.data);
      return;
    }
  }
  rafId=requestAnimationFrame(scanLoop);
}

function parseQR(raw){
  const seiban=raw.match(/製番[:\s]*([A-Za-z0-9\-]+)/);
  const katashiki=raw.match(/型式[:\s]*([A-Za-z0-9\-]+)/);
  const shaban=raw.match(/車番[:\s]*([A-Za-z0-9\-]+)/);
  if(seiban)document.getElementById('seiban').value=seiban[1];
  if(katashiki)document.getElementById('katashiki').value=katashiki[1];
  if(shaban)document.getElementById('shaban').value=shaban[1];
  if(!seiban&&!katashiki&&!shaban)document.getElementById('seiban').value=raw;
  document.getElementById('result-val').textContent=raw;
  document.getElementById('result-box').style.display='block';
}

function stopScan(){
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  fc=0;
  document.getElementById('cam-wrap').style.display='none';
  document.getElementById('cancel-btn').style.display='none';
  document.getElementById('scan-btn').style.display='block';
}

function reScan(){
  document.getElementById('result-box').style.display='none';
  startScan();
}

function sw(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='input')||(i===1&&tab==='guide')));
  document.getElementById('p-input').classList.toggle('active',tab==='input');
  document.getElementById('p-guide').classList.toggle('active',tab==='guide');
}

function saveMail(){
  const addr=document.getElementById('mail-to').value.trim();
  if(addr)localStorage.setItem('mailTo',addr);
  document.getElementById('mail-saved').style.display='block';
  setTimeout(()=>document.getElementById('mail-saved').style.display='none',2000);
}

function doSubmit(){
  const seiban=document.getElementById('seiban').value.trim();
  const katashiki=document.getElementById('katashiki').value.trim();
  const shaban=document.getElementById('shaban').value.trim();
  const op=document.getElementById('op').value.trim();
  if(!seiban||!katashiki||!shaban){alert('製番・型式・車番を入力してください');return;}
  if(!op){alert('担当者名を入力してください');return;}
  const all=[...extItems,...recItems];
  const unchecked=all.filter(i=>st[i.id]===null);
  if(unchecked.length>0&&!confirm('未確認 '+unchecked.length+'件あります。このまま進みますか？'))return;
  const now=new Date();
  const dt=now.toLocaleDateString('ja-JP')+' '+now.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  const ids=['e1','e2','e3','e4','e5','r1','r2','r3','r4'];
  const checks=ids.map(id=>st[id]?st[id].toUpperCase():'');
  const ngItems=all.filter(i=>st[i.id]==='ng').map(i=>i.label);
  const judge=ngItems.length>0?'要確認':'異常なし';
  const rem=document.getElementById('rem').value;
  const row=[dt,seiban,katashiki,shaban,op,...checks,judge,rem].join('\t');
  mailBody='【車両受け入れチェック記録】\n\n'
    +'日時: '+dt+'\n'
    +'製番: '+seiban+'\n'
    +'型式: '+katashiki+'\n'
    +'車番: '+shaban+'\n'
    +'担当者: '+op+'\n'
    +'判定: '+judge+'\n'
    +(ngItems.length>0?'NG項目: '+ngItems.join('、')+'\n':'')
    +(rem?'備考: '+rem+'\n':'')
    +'\n--- Excel貼り付け用データ ---\n'+row;
  const judgeHtml=ngItems.length>0
    ?`<span class="ng-badge">要確認</span> ${ngItems.join('、')}`
    :`<span class="ok-badge">異常なし</span>`;
  document.getElementById('summary').innerHTML=
    `製番: <strong>${seiban}</strong><br>型式: <strong>${katashiki}</strong><br>車番: <strong>${shaban}</strong><br>担当者: ${op}<br>日時: ${dt}<br>判定: ${judgeHtml}`+
    (rem?`<br>備考: ${rem}`:'');
  document.getElementById('form-wrap').style.display='none';
  document.getElementById('result-wrap').classList.add('active');
}

function sendMail(){
  const to=localStorage.getItem('mailTo')||'';
  if(!to){
    alert('「メール設定」タブで送信先アドレスを設定してください');
    sw('guide');
    return;
  }
  const subject=encodeURIComponent('車両受け入れチェック記録');
  const body=encodeURIComponent(mailBody);
  window.location.href='mailto:'+to+'?subject='+subject+'&body='+body;
  document.getElementById('sent-msg').style.display='block';
}

function doReset(){
  st={};mailBody='';
  document.getElementById('result-box').style.display='none';
  document.getElementById('seiban').value='';
  document.getElementById('katashiki').value='';
  document.getElementById('shaban').value='';
  document.getElementById('op').value='';
  document.getElementById('rem').value='';
  buildChecks(extItems,'ext');
  buildChecks(recItems,'rec');
  document.getElementById('form-wrap').style.display='block';
  document.getElementById('result-wrap').classList.remove('active');
  document.getElementById('sent-msg').style.display='none';
  window.scrollTo(0,0);
}

// 保存済みアドレスを復元
window.addEventListener('load',()=>{
  const saved=localStorage.getItem('mailTo');
  if(saved)document.getElementById('mail-to').value=saved;
});

buildChecks(extItems,'ext');
buildChecks(recItems,'rec');
</script>
</body>
</html>
